services:
  db:
    image: postgres:16
    container_name: recruitr_db
    environment:
      POSTGRES_USER: recruitr
      POSTGRES_PASSWORD: recruitr_dev_pw
      POSTGRES_DB: recruitr
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: recruitr_redis
    ports:
      - "6379:6379"

  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: recruitr_meili
    environment:
      MEILI_MASTER_KEY: meili_dev_master_key
    ports:
      - "7700:7700"
    volumes:
      - meilidata:/meili_data

  minio:
    image: minio/minio:latest
    container_name: recruitr_minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin_dev_pw
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console UI
    volumes:
      - miniodata:/data

  centrifugo:
    image: centrifugo/centrifugo:v5
    container_name: recruitr_centrifugo
    command: centrifugo -c /centrifugo/config.json
    ports:
      - "8000:8000"
    volumes:
      - ./infra/centrifugo/config.json:/centrifugo/config.json:ro

volumes:
  pgdata:
  meilidata:
  miniodata:

